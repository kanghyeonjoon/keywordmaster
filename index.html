<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>환자 심리 키워드 분석기</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Pretendard', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
        }
        
        .container {
            width: 100%;
            max-width: 1200px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }
        
        h1 {
            font-size: 2.5em;
            font-weight: 800;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
            font-weight: 300;
        }
        
        .controls {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }
        
        .search-section {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        input[type="text"] {
            flex: 1;
            min-width: 250px;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
            font-family: 'Pretendard', sans-serif;
        }
        
        input[type="text"]:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        button {
            padding: 15px 35px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Pretendard', sans-serif;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .preset-keywords {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .preset-keywords span {
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }
        
        .keyword-tag {
            padding: 8px 16px;
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }
        
        .keyword-tag:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
            transform: translateY(-2px);
        }
        
        .chart-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        #main {
            width: 100%;
            height: 700px;
        }
        
        .legend {
            padding: 20px 30px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 50%;
        }
        
        .legend-text {
            font-size: 14px;
            color: #555;
            font-weight: 500;
        }
        
        .info-section {
            margin-top: 20px;
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .info-title {
            font-size: 18px;
            font-weight: 700;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .info-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }
        
        .info-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid #667eea;
        }
        
        .info-label {
            font-size: 13px;
            color: #888;
            margin-bottom: 5px;
            font-weight: 500;
        }
        
        .info-value {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        
        .cta-section {
            margin-top: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(102, 126, 234, 0.4);
        }
        
        .cta-content {
            color: white;
        }
        
        .cta-icon {
            font-size: 3em;
            margin-bottom: 15px;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .cta-content h3 {
            font-size: 1.8em;
            font-weight: 800;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        
        .cta-content p {
            font-size: 1.1em;
            opacity: 0.95;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .kakao-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 18px 40px;
            background: #FEE500;
            color: #3C1E1E;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(254, 229, 0, 0.3);
        }
        
        .kakao-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(254, 229, 0, 0.5);
        }
        
        .kakao-icon {
            font-size: 1.3em;
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 1.8em; }
            .subtitle { font-size: 0.95em; }
            #main { height: 500px; }
            .search-section { flex-direction: column; }
            input[type="text"] { min-width: 100%; }
            button { width: 100%; }
            .cta-section { padding: 40px 25px; }
            .cta-content h3 { font-size: 1.4em; }
            .cta-content p { font-size: 1em; }
        }
    </style>
</head>
<body>

            <div class="preset-keywords">

                '식단/영양': ['암환자식단', '단백질섭취', '먹으면좋은음식', '피해야할음식', '영양제'],
                '일상관리': ['운동', '수면', '멘탈관리', '가족돌봄', '직장복귀'],
                '병원선택': ['요양병원', '한방병행', '2차소견', '전문센터', '재활프로그램']
            }
        };

        // 키워드 → 업종 매핑 (기획안 생성기 폼 자동 입력용)
        const keywordIndustry = {
            '허리디스크': '정형외과', '무릎통증': '정형외과',
            '임플란트': '치과',
            '쌍꺼풀': '성형외과',
            '여드름': '피부과', '실리프팅': '피부과', '저속노화': '피부과',
            '맞춤가구': '인테리어(맞춤가구)',
            '암관리': '암'
        };

        // 카테고리별 색상 매핑
        const categoryColors = {
            '비용/가격': '#FF6B6B',
            '치료방법': '#4ECDC4',
            '치료과정': '#4ECDC4',
            '증상확인': '#45B7D1',
            '증상별': '#45B7D1',
            '병원선택': '#FFA07A',
            '일상관리': '#98D8C8',
            '회복/재활': '#F7DC6F',
            '회복/예후': '#F7DC6F',
            '회복과정': '#F7DC6F',
            '사후관리': '#F7DC6F',
            '부작용/주의': '#E74C3C',
            '부작용/재수술': '#E74C3C',
            '종류/재료': '#BB8FCE',
            '디자인': '#82E0AA',
            '홈케어': '#98D8C8',
            '원인/예방': '#F39C12',
            '수술방법': '#3498DB',
            '운동/재활': '#2ECC71',
            '일상관리': '#95A5A6',
            '병원/제품': '#9B59B6'
        };

        function getMindmapData(centerKeyword) {
            const keywordData = keywordDatabase[centerKeyword];
            
            if (!keywordData) {
                return getDefaultData(centerKeyword);
            }

            let data = [{
                name: centerKeyword,
                symbolSize: 100,
                itemStyle: { 
                    color: '#2C3E50',
                    shadowBlur: 20,
                    shadowColor: 'rgba(0,0,0,0.3)'
                },
                label: { 
                    color: 'white', 
                    fontWeight: 'bold',
                    fontSize: 18
                },
                category: 'center'
            }];

            let links = [];
            let categories = [];
            let categoryIndex = 0;

            Object.keys(keywordData).forEach(category => {
                categories.push({ name: category });
                const color = categoryColors[category] || '#95A5A6';
                
                keywordData[category].forEach(keyword => {
                    const size = 45 + Math.random() * 15; // 45-60 사이
                    
                    data.push({
                        name: keyword,
                        symbolSize: size,
                        itemStyle: { 
                            color: color,
                            shadowBlur: 10,
                            shadowColor: 'rgba(0,0,0,0.2)'
                        },
                        label: {
                            fontSize: 13,
                            fontWeight: '500'
                        },
                        category: categoryIndex
                    });

                    links.push({
                        source: centerKeyword,
                        target: keyword,
                        lineStyle: {
                            color: color,
                            width: 2,
                            opacity: 0.6
                        }
                    });
                });
                
                categoryIndex++;
            });

            return { data, links, categories };
        }

        function getDefaultData(centerKeyword) {
            const defaultCategories = {
                '비용/가격': ['비용', '가격', '할인', '이벤트', '보험적용'],
                '치료방법': ['치료', '효과', '기간', '과정', '부작용'],
                '병원선택': ['잘하는곳', '추천', '후기', '유명한곳', '전문의'],
                '일상관리': ['주의사항', '관리', '생활습관', '예방', '운동']
            };

            let data = [{
                name: centerKeyword,
                symbolSize: 100,
                itemStyle: { color: '#2C3E50' },
                label: { color: 'white', fontWeight: 'bold', fontSize: 18 },
                category: 'center'
            }];

            let links = [];
            let categories = [];
            let categoryIndex = 0;

            Object.keys(defaultCategories).forEach(category => {
                categories.push({ name: category });
                const color = categoryColors[category] || '#95A5A6';
                
                defaultCategories[category].forEach(keyword => {
                    data.push({
                        name: `${centerKeyword}${keyword}`,
                        symbolSize: 50,
                        itemStyle: { color: color },
                        category: categoryIndex
                    });

                    links.push({
                        source: centerKeyword,
                        target: `${centerKeyword}${keyword}`
                    });
                });
                
                categoryIndex++;
            });

            return { data, links, categories };
        }

        function updateLegend(categories) {
            const legendDiv = document.getElementById('legend');
            legendDiv.innerHTML = '<div class="legend-item"><strong>환자 검색 카테고리:</strong></div>';
            
            categories.forEach(cat => {
                const color = categoryColors[cat.name] || '#95A5A6';
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.innerHTML = `
                    <div class="legend-color" style="background-color: ${color}"></div>
                    <div class="legend-text">${cat.name}</div>
                `;
                legendDiv.appendChild(item);
            });
        }

        function updateInfo(keyword, graphData) {
            const infoDiv = document.getElementById('infoContent');
            const totalKeywords = graphData.data.length - 1;
            const categories = graphData.categories.length;
            
            const isCustomData = keywordDatabase.hasOwnProperty(keyword);
            const dataSource = isCustomData ? '실제 환자 검색 패턴 기반' : '일반 템플릿';

            infoDiv.innerHTML = `
                <div class="info-card">
                    <div class="info-label">분석 키워드</div>
                    <div class="info-value">${keyword}</div>
                </div>
                <div class="info-card">
                    <div class="info-label">연관 키워드</div>
                    <div class="info-value">${totalKeywords}개</div>
                </div>
                <div class="info-card">
                    <div class="info-label">카테고리</div>
                    <div class="info-value">${categories}개</div>
                </div>
                <div class="info-card">
                    <div class="info-label">데이터 출처</div>
                    <div class="info-value">${dataSource}</div>
                </div>
            `;
        }

        function analyzeKeyword() {
            const keyword = document.getElementById('keywordInput').value.trim();
            if (!keyword) {
                alert("키워드를 입력해주세요!");
                return;
            }

            const graphData = getMindmapData(keyword);

            const option = {
                title: {
                    text: `'${keyword}' 환자 검색 키워드 맵`,
                    left: 'center',
                    top: 20,
                    textStyle: {
                        fontSize: 24,
                        fontWeight: 'bold',
                        color: '#333'
                    }
                },
                tooltip: {
                    formatter: function(params) {
                        if (params.dataType === 'node') {
                            return `<strong>${params.data.name}</strong>`;
                        }
                        return '';
                    }
                },
                animationDurationUpdate: 1500,
                animationEasingUpdate: 'cubicInOut',
                series: [{
                    type: 'graph',
                    layout: 'force',
                    force: {
                        repulsion: 1000,
                        edgeLength: 150,
                        gravity: 0.1
                    },
                    data: graphData.data,
                    links: graphData.links,
                    categories: graphData.categories,
                    roam: true,
                    label: {
                        show: true,
                        position: 'inside',
                        formatter: '{b}',
                        fontSize: 13
                    },
                    lineStyle: {
                        curveness: 0.2,
                        opacity: 0.7
                    },
                    emphasis: {
                        focus: 'adjacency',
                        lineStyle: { 
                            width: 5,
                            opacity: 1
                        },
                        itemStyle: {
                            shadowBlur: 20,
                            shadowColor: 'rgba(0,0,0,0.5)'
                        }
                    }
                }]
            };

            myChart.setOption(option, true);
            updateLegend(graphData.categories);
            updateInfo(keyword, graphData);
        }

        function quickAnalyze(keyword) {
            document.getElementById('keywordInput').value = keyword;
            analyzeKeyword();
        }

        // 키워드 노드 클릭 → 기획안 생성기 폼으로 연결 (주제·업종·기획안만 모드 자동 입력)
        myChart.on('click', function (params) {
            if (params.dataType !== 'node') return;
            const center = document.getElementById('keywordInput').value.trim();
            const topic = (params.data.name === center) ? center : center + ' ' + params.data.name;
            const field = keywordIndustry[center] || '';
            const url = 'script-generator.html?' + new URLSearchParams({
                topic: topic, field: field, mode: '기획안만'
            }).toString();
            document.getElementById('planCtaText').textContent = '선택한 주제: 「' + topic + '」';
            document.getElementById('planCtaLink').href = url;
            document.getElementById('planCta').style.display = 'block';
        });

        // 초기 실행
        document.getElementById('keywordInput').value = "허리디스크";
        analyzeKeyword();

        // 반응형 대응
        window.addEventListener('resize', function() {
            myChart.resize();
        });
    </script>
</body>
</html>
