<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 유튜브 기획안·대본 자동 생성기</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Pretendard', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
        }

        .container { width: 100%; max-width: 760px; }

        header { text-align: center; margin-bottom: 30px; color: white; }

        h1 {
            font-size: 2.2em;
            font-weight: 800;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle { font-size: 1.05em; opacity: 0.9; font-weight: 300; }

        .card {
            background: white;
            border-radius: 20px;
            padding: 34px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .row { display: flex; gap: 14px; flex-wrap: wrap; }
        .row > .form-group { flex: 1; min-width: 220px; }

        .form-group { margin-bottom: 18px; }

        label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: #444;
            margin-bottom: 7px;
        }

        label .req { color: #e74c3c; }
        label .opt { color: #999; font-weight: 400; font-size: 12px; }

        input[type="text"], input[type="email"], textarea, select {
            width: 100%;
            padding: 13px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
            font-family: 'Pretendard', sans-serif;
            background: white;
            color: #333;
        }

        input:focus, textarea:focus, select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea { resize: vertical; min-height: 84px; }

        .format-toggle { display: flex; gap: 10px; }

        .format-toggle input { display: none; }

        .format-toggle label {
            flex: 1;
            text-align: center;
            padding: 13px 0;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            color: #666;
            margin-bottom: 0;
            transition: all 0.2s;
        }

        .format-toggle input:checked + label {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
            color: white;
        }

        .hint { font-size: 12px; color: #999; margin-top: 5px; line-height: 1.5; }

        button {
            width: 100%;
            padding: 17px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Pretendard', sans-serif;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            margin-top: 6px;
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        #result {
            display: none;
            margin-top: 20px;
            padding: 18px 20px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            line-height: 1.6;
        }

        #result.ok { display: block; background: #eafaf1; color: #1e8449; border: 2px solid #a9dfbf; }
        #result.err { display: block; background: #fdedec; color: #c0392b; border: 2px solid #f5b7b1; }

        footer { margin-top: 24px; color: rgba(255,255,255,0.85); font-size: 13px; text-align: center; line-height: 1.7; }

        @media (max-width: 600px) {
            h1 { font-size: 1.6em; }
            .card { padding: 24px 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 유튜브 기획안·대본 자동 생성기</h1>
            <p class="subtitle">영상 정보를 입력하면 몇 분 안에 기획안 + 대본이 이메일로 도착합니다</p>
        </header>

        <div class="card">
            <form id="genForm">
                <div class="row">
                    <div class="form-group">
                        <label>채널명 <span class="req">*</span></label>
                        <input type="text" name="channel" required placeholder="예: 김원장TV">
                    </div>
                    <div class="form-group">
                        <label>분야/업종 <span class="req">*</span></label>
                        <input type="text" name="field" required placeholder="예: 재테크, 요리, 병원, IT리뷰">
                    </div>
                </div>

                <div class="form-group">
                    <label>생성 모드 <span class="req">*</span></label>
                    <div class="format-toggle">
                        <input type="radio" name="mode" value="기획안+대본" id="modeBoth" checked>
                        <label for="modeBoth">📦 기획안+대본</label>
                        <input type="radio" name="mode" value="기획안만" id="modePlan">
                        <label for="modePlan">📋 기획안만</label>
                        <input type="radio" name="mode" value="대본만" id="modeScript">
                        <label for="modeScript">🎬 대본만</label>
                    </div>
                    <div class="hint">추천 흐름: <b>기획안만</b> 생성 → 이메일로 검토·수정 → <b>대본만</b> 모드에 붙여넣어 대본 생성</div>
                </div>

                <div class="form-group" id="planGroup" style="display:none">
                    <label>검토된 기획안 붙여넣기 <span class="req">*</span></label>
                    <textarea name="plan" id="planBox" style="min-height:140px" placeholder="이메일로 받은 기획안을 검토·수정한 뒤 여기에 붙여넣으세요. 이 기획안 그대로 대본이 만들어집니다."></textarea>
                </div>

                <div class="form-group">
                    <label>영상 형식 <span class="req">*</span></label>
                    <div class="format-toggle">
                        <input type="radio" name="format" value="롱폼" id="fmtLong" checked>
                        <label for="fmtLong">📺 롱폼 (8~15분)</label>
                        <input type="radio" name="format" value="숏폼" id="fmtShort">
                        <label for="fmtShort">📱 숏폼 (60초)</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>영상 주제 <span class="req">*</span></label>
                    <input type="text" name="topic" required placeholder="예: 사회초년생이 월급 관리 시작하는 법">
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>타깃 시청자 <span class="opt">(선택)</span></label>
                        <input type="text" name="target" placeholder="예: 2030 직장인">
                    </div>
                    <div class="form-group">
                        <label>목표 길이 <span class="opt">(선택)</span></label>
                        <input type="text" name="length" placeholder="예: 10분">
                    </div>
                </div>

                <div class="form-group">
                    <label>톤/스타일 <span class="opt">(선택)</span></label>
                    <input type="text" name="tone" placeholder="예: 친근한 반말, 전문적, 유머러스">
                </div>

                <div class="form-group">
                    <label>꼭 들어갈 내용 / 참고사항 <span class="opt">(선택)</span></label>
                    <textarea name="notes" placeholder="예: 마지막에 무료 상담 이벤트 언급, 경쟁사 언급 금지"></textarea>
                </div>

                <div class="form-group" id="presetGroup" style="display:none">
                    <label>도입부 프리셋 <span class="opt">(hooks.js에 모아둔 도입부를 자동으로 불러옵니다)</span></label>
                    <select id="hookPreset">
                        <option value="">직접 입력</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>벤치마킹 도입부 예시 <span class="opt">(선택 · 한 줄에 하나씩)</span></label>
                    <textarea name="examples" id="examplesBox" placeholder="잘 터진 영상들의 도입부(훅) 문장을 붙여넣으세요. AI가 공통 구조를 분석해 이 주제에 맞는 도입부·제목·썸네일 문구를 그 패턴으로 만들어줍니다.&#10;예:&#10;- 이거 모르면 월급 300 그냥 버리는 겁니다&#10;- 제가 3년 동안 병원 30곳을 컨설팅하며 알게 된 사실인데요"></textarea>
                    <div class="hint">도입부 예시를 넣으면 → 구조를 일반화한 '도입부 공식'과 그 공식을 적용한 도입부 3가지 버전이 기획안에 포함됩니다.</div>
                </div>

                <div class="form-group">
                    <label>결과 받을 이메일 <span class="req">*</span></label>
                    <input type="email" name="email" required value="ekrk5614@gmail.com">
                </div>

                <button type="submit" id="submitBtn">🚀 기획안 + 대본 생성하기</button>
            </form>

            <div id="result"></div>
        </div>

        <footer>
            생성에는 보통 1~3분이 걸립니다 · 결과는 이메일 발송 + Google Docs 저장<br>
            Make.com 무료 플랜 기준 월 약 200건까지 생성 가능
        </footer>
    </div>

    <script src="hooks.js"></script>
    <script>
        const WEBHOOK_URL = 'https://hook.eu2.make.com/vg89iv826vj2majdemywlw75rwgo343v';

        const form = document.getElementById('genForm');
        const btn = document.getElementById('submitBtn');
        const result = document.getElementById('result');

        // 생성 모드에 따라 '검토된 기획안' 입력칸 표시/필수 전환
        function syncModeUI() {
            const mode = form.elements['mode'].value;
            const show = mode === '대본만';
            document.getElementById('planGroup').style.display = show ? '' : 'none';
            document.getElementById('planBox').required = show;
        }
        for (const r of form.querySelectorAll('input[name="mode"]')) r.addEventListener('change', syncModeUI);

        // URL 파라미터로 폼 자동 입력 (키워드 뷰어·주간 메일의 '기획안 만들기' 링크용)
        // 예: script-generator.html?topic=임플란트 재수술&field=치과&mode=기획안만&notes=반복질문...
        (function prefillFromUrl() {
            const params = new URLSearchParams(location.search);
            const fields = ['channel', 'field', 'topic', 'target', 'length', 'tone', 'notes', 'examples', 'email', 'plan'];
            for (const name of fields) {
                const v = params.get(name);
                if (v && form.elements[name]) form.elements[name].value = v;
            }
            for (const radioName of ['mode', 'format']) {
                const v = params.get(radioName);
                if (v) {
                    const radio = form.querySelector(`input[name="${radioName}"][value="${v}"]`);
                    if (radio) radio.checked = true;
                }
            }
            syncModeUI();
        })();

        // hooks.js(HOOK_NOTES)가 있으면 [섹션]별로 파싱해 프리셋 드롭다운을 채운다
        (function initPresets() {
            if (typeof HOOK_NOTES !== 'string') return;
            const presets = {};
            let current = null;
            for (const raw of HOOK_NOTES.split('\n')) {
                const line = raw.trim();
                if (!line) continue;
                const section = line.match(/^\[(.+)\]$/);
                if (section) { current = section[1].trim(); presets[current] = []; continue; }
                if (current) presets[current].push(line.replace(/^-\s*/, ''));
            }
            const names = Object.keys(presets).filter(k => presets[k].length);
            if (!names.length) return;
            const select = document.getElementById('hookPreset');
            for (const name of names) {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name + ' (' + presets[name].length + '개)';
                select.appendChild(opt);
            }
            select.addEventListener('change', () => {
                const box = document.getElementById('examplesBox');
                box.value = select.value ? presets[select.value].map(h => '- ' + h).join('\n') : '';
            });
            document.getElementById('presetGroup').style.display = '';
        })();

        // 웹훅 → Make HTTP 모듈의 JSON 본문에 값이 그대로 삽입되므로,
        // JSON을 깨뜨리는 문자(큰따옴표·역슬래시·줄바꿈)를 안전한 문자로 치환한다
        function sanitize(v) {
            return v.trim()
                .replace(/\\/g, '/')
                .replace(/"/g, "'")
                .replace(/\r?\n+/g, ' | ');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btn.disabled = true;
            btn.textContent = '⏳ 전송 중...';
            result.className = '';
            result.style.display = 'none';

            const fd = new FormData(form);
            const body = new URLSearchParams();
            for (const [key, value] of fd.entries()) body.append(key, sanitize(value));

            try {
                const res = await fetch(WEBHOOK_URL, { method: 'POST', body });
                if (res.ok) {
                    result.className = 'ok';
                    result.innerHTML = '✅ 접수 완료! 1~3분 안에 <b>' + fd.get('email') + '</b> 으로 기획안과 대본이 도착합니다.';
                    form.reset();
                } else {
                    throw new Error('응답 오류 (' + res.status + ')');
                }
            } catch (err) {
                result.className = 'err';
                result.innerHTML = '❌ 전송에 실패했습니다. 잠시 후 다시 시도해주세요.<br><span style="font-weight:400;font-size:13px">계속 실패하면 Make.com에서 시나리오가 켜져 있는지(ON) 확인하세요.</span>';
            }

            btn.disabled = false;
            btn.textContent = '🚀 기획안 + 대본 생성하기';
        });
    </script>
</body>
</html>
