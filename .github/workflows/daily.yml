name: 주제 채굴 — 매일 수집

on:
  workflow_dispatch:        # 수동 실행 버튼
  schedule:
    - cron: "0 21 * * *"    # UTC 21:00 = KST 06:00
  push:
    paths:
      - ".github/miner-test-trigger"   # 테스트 발사용 (이 파일 수정 시 실행)

permissions:
  contents: write   # data/vault.json 커밋용

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 시크릿 설정 확인
        run: |
          if [ -z "${{ secrets.YOUTUBE_API_KEY }}" ]; then
            echo "::warning::GitHub Secrets 미설정 — 수집을 건너뜁니다. topic-miner/README.md의 최초 설정을 완료하세요."
            echo "SKIP=1" >> "$GITHUB_ENV"
          fi
      - name: 의존성 설치
        if: env.SKIP != '1'
        run: pip install -r topic-miner/requirements.txt
      - name: 수집 → 등급화 → 채점 → 금고 적립
        if: env.SKIP != '1'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python topic-miner/src/daily_collect.py
      - name: 대시보드 데이터 발행 (data/vault.json)
        if: env.SKIP != '1'
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python topic-miner/src/export_json.py
      - name: 대시보드 데이터 커밋
        if: env.SKIP != '1'
        run: |
          git config user.name "topic-miner-bot"
          git config user.email "actions@github.com"
          git add data/vault.json
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "대시보드 데이터 갱신 ($(date +%Y-%m-%d))"
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
